###############################################################################
# Projet-Labo-03-02-Serveur-FTP-ProFTPD
# Configuration du fichier proftpd.conf
###############################################################################

Fichier :

/etc/proftpd/proftpd.conf


###############################################################################
# Informations générales
###############################################################################

Serveur FTP :

ProFTPD

Port :

21

Mode de fonctionnement :

Standalone


###############################################################################
# Configuration principale
###############################################################################

ServerName                      "Serveur FTP ProFTPD"

ServerType                      standalone

DefaultServer                   on

Port                            21

UseIPv6                         off

Umask                           022

MaxInstances                    30


###############################################################################
# Utilisateur du service
###############################################################################

User                            proftpd

Group                           nogroup


###############################################################################
# Répertoire partagé
###############################################################################

Répertoire FTP :

/srv/ftp


###############################################################################
# Configuration des connexions anonymes
###############################################################################

Section activée :

<Anonymous ~ftp>

Configuration utilisée :

User                            ftp
Group                           nogroup

UserAlias                       anonymous ftp

RequireValidShell               off

MaxClients                      10

DisplayLogin                    welcome.msg

<Directory *>

    <Limit WRITE>
        AllowAll
    </Limit>

</Directory>

</Anonymous>


###############################################################################
# Journalisation
###############################################################################

Journal système :

journalctl -u proftpd

État du service :

systemctl status proftpd


###############################################################################
# Service
###############################################################################

Activation :

systemctl enable proftpd

Démarrage :

systemctl start proftpd

Redémarrage :

systemctl restart proftpd

Arrêt :

systemctl stop proftpd


###############################################################################
# Vérification de la configuration
###############################################################################

Vérifier la présence du fichier :

ls -l /etc/proftpd/proftpd.conf

Consulter le fichier :

nano /etc/proftpd/proftpd.conf


###############################################################################
# Vérification du fonctionnement
###############################################################################

Le serveur doit :

✓ Écouter sur le port 21.

✓ Accepter les connexions FTP.

✓ Autoriser les connexions anonymes.

✓ Donner accès au répertoire :

/srv/ftp

✓ Permettre les téléchargements.

✓ Permettre les envois de fichiers
(selon les permissions configurées).


###############################################################################
# Paramètres importants
###############################################################################

Port :

21

Mode :

Standalone

Utilisateur FTP :

ftp

Groupe :

nogroup

Répertoire partagé :

/srv/ftp

Utilisateur du service :

proftpd

Groupe du service :

nogroup


###############################################################################
# Dépannage
###############################################################################

Le service ne démarre pas :

systemctl status proftpd

Consulter les journaux :

journalctl -u proftpd

Vérifier le fichier :

nano /etc/proftpd/proftpd.conf

Redémarrer :

systemctl restart proftpd


###############################################################################
# Validation
###############################################################################

✓ Le fichier proftpd.conf est présent.

✓ La configuration est correctement chargée.

✓ Les connexions anonymes sont actives.

✓ Le serveur écoute sur le port 21.

✓ Le répertoire /srv/ftp est accessible.

✓ Les transferts FTP fonctionnent.

✓ Aucun message d'erreur n'apparaît dans les journaux.
