#!/usr/sbin/nft -f

flush ruleset

#########################################
# NAT / PAT
#########################################

table ip nat_pat {

    chain nat {
        type nat hook postrouting priority srcnat;
        oifname "enp0s3" masquerade
    }

    chain pat {
        type nat hook prerouting priority dstnat;

        # Redirection HTTP vers le serveur Apache
        iifname "enp0s3" tcp dport 80 dnat to 192.168.12.250
    }
}

#########################################
# FIREWALL
#########################################

table inet filter {

    #####################################
    # INPUT
    #####################################

    chain input {

        type filter hook input priority filter;
        policy drop;

        # Autoriser les connexions déjà établies
        ct state established,related accept

        # Interface loopback
        iif "lo" accept

        # LAN1
        iifname "enp0s8" ip saddr 192.168.11.0/24 tcp dport {22,53} accept

        # WAN
        iifname "enp0s3" tcp dport {22,53} accept
    }

    #####################################
    # FORWARD
    #####################################

    chain forward {

        type filter hook forward priority filter;
        policy drop;

        # Etat de connexion
        ct state established,related accept

        #################################
        # LAN1 -> WAN
        #################################

        iifname "enp0s8" oifname "enp0s3" accept

        #################################
        # WAN -> DNS primaire
        #################################

        iifname "enp0s3" \
        oifname "enp0s9" \
        udp dport 53 \
        ip daddr 192.168.12.251 accept

        #################################
        # WAN -> Serveur Apache
        #################################

        iifname "enp0s3" \
        oifname "enp0s9" \
        tcp dport {80,443} \
        ip daddr 192.168.12.250 accept

        #################################
        # Transfert de zone DNS
        #################################

        iifname "enp0s8" \
        oifname "enp0s9" \
        tcp dport 53 \
        ip saddr 192.168.11.251 \
        ip daddr 192.168.12.251 accept

        iifname "enp0s9" \
        oifname "enp0s8" \
        tcp dport 53 \
        ip saddr 192.168.12.251 \
        ip daddr 192.168.11.251 accept

        #################################
        # LAN1 -> Serveur Apache
        #################################

        iifname "enp0s8" \
        oifname "enp0s9" \
        tcp dport {80,443} \
        ip saddr 192.168.11.0/24 \
        ip daddr 192.168.12.250 accept

        #################################
        # Ping entre LAN1 et LAN2
        #################################

        iifname "enp0s8" \
        oifname "enp0s9" \
        icmp type {echo-request, echo-reply} accept

        iifname "enp0s9" \
        oifname "enp0s8" \
        icmp type {echo-request, echo-reply} accept
    }

    #####################################
    # OUTPUT
    #####################################

    chain output {

        type filter hook output priority filter;
        policy accept;
    }
}
